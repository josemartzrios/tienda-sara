<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Sara - Crear Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h1 class="mb-4">➕ Crear Nuevo Producto</h1>

        <a th:href="@{/products}" class="btn btn-secondary mb-3">⬅ Regresar</a>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/products/create}" th:object="${productDto}" method="post">

            <!-- Descripción -->
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción</label>
                <input type="text" id="descripcion" class="form-control" th:field="*{descripcion}"
                    placeholder="Nombre del producto">
                <div th:if="${#fields.hasErrors('descripcion')}" class="text-danger" th:errors="*{descripcion}"></div>
            </div>

            <!-- Precio -->
            <div class="mb-3">
                <label for="precio" class="form-label">Precio</label>
                <input type="number" id="precio" class="form-control" step="0.01" th:field="*{precio}"
                    placeholder="0.00">
                <div th:if="${#fields.hasErrors('precio')}" class="text-danger" th:errors="*{precio}"></div>
            </div>

            <!-- Cantidad -->
            <div class="mb-3">
                <label for="cantidad" class="form-label">Cantidad</label>
                <input type="number" id="cantidad" class="form-control" th:field="*{cantidad}" placeholder="0">
                <div th:if="${#fields.hasErrors('cantidad')}" class="text-danger" th:errors="*{cantidad}"></div>
            </div>

            <!-- Categoría -->
            <div class="mb-3">
                <label for="idCategoria" class="form-label">Categoría</label>
                <select id="idCategoria" class="form-select" th:field="*{idCategoria}">
                    <option value="">-- Selecciona una categoría --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.descripcion}">
                    </option>
                </select>
                <div th:if="${#fields.hasErrors('idCategoria')}" class="text-danger" th:errors="*{idCategoria}"></div>
            </div>

            <!-- Marca -->
            <div class="mb-3">
                <label for="idMarca" class="form-label">Marca</label>
                <select id="idMarca" class="form-select" th:field="*{idMarca}">
                    <option value="">-- Selecciona una marca --</option>
                    <option th:each="mark : ${marks}" th:value="${mark.id}" th:text="${mark.descripcion}">
                    </option>
                </select>
                <div th:if="${#fields.hasErrors('idMarca')}" class="text-danger" th:errors="*{idMarca}"></div>
            </div>

            <button type="submit" class="btn btn-success">💾 Guardar Producto</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
