<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Sara - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">🛒 Tienda Sara — Productos</h1>

    <a th:href="@{/products/create}" class="btn btn-primary mb-3">
        ➕ Nuevo Producto
    </a>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Categoría</th>
                <th>Marca</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.descripcion}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(product.precio, 1, 2)}"></td>
                <td th:text="${product.cantidad}"></td>
                <td th:text="${product.category.descripcion}"></td>
                <td th:text="${product.mark.descripcion}"></td>
                <td>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                       class="btn btn-warning btn-sm">✏️ Editar</a>
                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar este producto?');">
                        🗑️ Eliminar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
        No hay productos registrados.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
